<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gooey CSS puro</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
  font-family:system-ui;
}

/* CONTENEDOR GOOEY */
.scene{
  position:relative;
  width:360px;
  height:160px;

  /* AJUSTE MÍNIMO FUNCIONAL */
  filter: blur(2px) contrast(30);
}

/* BLOBS */
.blob{
  position:absolute;
  top:30px;
  width:100px;
  height:100px;
  background:#6a00ff;
  border-radius:50%;
}

/* HALO ROSA */
.blob::after{
  content:"";
  position:absolute;
  inset:-6px;
  background:#ff2bd6;
  border-radius:inherit;
  z-index:-1;
}

/* POSICIONES */
.left{
  left:60px;
  animation:leftMove 3s ease-in-out infinite;
}

.right{
  left:200px;
  animation:rightMove 3s ease-in-out infinite;
}

/* ANIMACIONES */
@keyframes leftMove{
  0%   { transform: translateX(0); }
  50%  { transform: translateX(50px); }
  100% { transform: translateX(0); }
}

@keyframes rightMove{
  0%   { transform: translateX(0); }
  50%  { transform: translateX(-50px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="scene">
  <div class="blob left"></div>
  <div class="blob right"></div>
</div>

</body>
</html>
